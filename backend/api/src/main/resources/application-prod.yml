server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/backoffice_itec
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
  nombre: ${ADMIN_NOMBRE:Admin}
  apellido: ${ADMIN_APELLIDO:Prod}
  email: ${ADMIN_EMAIL:admin@itec.edu.ar}
  telefono: ${ADMIN_TELEFONO:000000000}