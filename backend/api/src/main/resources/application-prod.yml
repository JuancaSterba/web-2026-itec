spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:validate}
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    root: info

server:
  port: 8080

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
  nombre: ${ADMIN_NOMBRE:Admin}
  apellido: ${ADMIN_APELLIDO:Prod}
  dni: ${ADMIN_DNI:00.000.000}
  email: ${ADMIN_EMAIL:admin@itec.edu.ar}
  telefono: ${ADMIN_TELEFONO:000000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://tudominio.com}